# PostgreSQL — override via env vars (DB_URL / DB_USERNAME / DB_PASSWORD) in any real environment
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/3D-JavaApp}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT — MUST set JWT_SECRET (base64, >= 256-bit) in any non-local environment.
# Local dev fallback is insecure; never use it in Docker or production.
app.jwt.secret=${JWT_SECRET:dGhpcy1pcy1hLXZlcnktc2VjcmV0LWtleS10aGF0LWlzLWxvbmctZW5vdWdo}
app.jwt.expiration=${JWT_EXPIRATION:604800000}

# CORS — comma-separated list of allowed origins.
# Production: set ALLOWED_ORIGINS=https://druk3d.pl,https://www.druk3d.pl
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:4200}

# File Upload — STL files; default 25 MB; override via UPLOAD_MAX_SIZE (e.g. 50MB)
spring.servlet.multipart.max-file-size=${UPLOAD_MAX_SIZE:25MB}
spring.servlet.multipart.max-request-size=${UPLOAD_MAX_SIZE:25MB}

# Include the exception reason in error responses so the frontend can show it
server.error.include-message=always

# Default administrator account, seeded on startup if missing.
# MUST set a real ADMIN_PASSWORD in production — the dev default is insecure.
app.admin.email=${ADMIN_EMAIL:admin@druk3d.pl}
app.admin.password=${ADMIN_PASSWORD:admin123}

# Platform fee (percentage added on top of contractor price)
platform.fee.percent=${PLATFORM_FEE_PERCENT:10.0}

# Mock InPost shipping prices by parcel size
shipping.price.a=${SHIPPING_PRICE_A:12.99}
shipping.price.b=${SHIPPING_PRICE_B:14.99}
shipping.price.c=${SHIPPING_PRICE_C:19.99}

# AI Slicer Advisor / Price Estimate — set AI_API_KEY to enable Claude/OpenAI/Grok. Without it, rule-based fallback is used.
ai.api.key=${AI_API_KEY:}
ai.api.provider=${AI_API_PROVIDER:claude}
# AI_API_PROVIDER=grok uses xAI's Grok (OpenAI-compatible API). Override the model via AI_GROK_MODEL if needed.
ai.grok.model=${AI_GROK_MODEL:grok-4-latest}

# Email / SMTP — set SMTP_HOST, SMTP_PORT, SMTP_USERNAME, SMTP_PASSWORD in production
spring.mail.host=${SMTP_HOST:localhost}
spring.mail.port=${SMTP_PORT:25}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS:true}
spring.mail.properties.mail.smtp.ssl.trust=${SMTP_SSL_TRUST:smtp.resend.com}
app.mail.from=${MAIL_FROM:noreply@druk3d.pl}
app.base-url=${APP_BASE_URL:http://localhost:4200}
