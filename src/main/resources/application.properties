# PostgreSQL — override via env vars (DB_URL / DB_USERNAME / DB_PASSWORD) in any real environment
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/3D-JavaApp}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT — MUST set JWT_SECRET (base64, >= 256-bit) in production. The default below is for local dev only.
app.jwt.secret=${JWT_SECRET:dGhpcy1pcy1hLXZlcnktc2VjcmV0LWtleS10aGF0LWlzLWxvbmctZW5vdWdo}
app.jwt.expiration=${JWT_EXPIRATION:604800000}

# File Upload Configuration
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Include the exception reason in error responses so the frontend can show it
server.error.include-message=always

# Default administrator account, seeded on startup if missing.
# MUST set a real ADMIN_PASSWORD in production — the dev default is insecure.
app.admin.email=${ADMIN_EMAIL:admin@druk3d.pl}
app.admin.password=${ADMIN_PASSWORD:admin123}
