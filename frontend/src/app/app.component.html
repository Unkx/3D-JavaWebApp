<header class="navbar">
  <a routerLink="/" class="navbar__brand" aria-label="Strona główna">
    <span class="navbar__icon" aria-hidden="true">🖨️</span>
    <span class="navbar__title">Druk3D</span>
  </a>

  <nav class="navbar__links" aria-label="Nawigacja główna">
    <button class="btn-theme" (click)="theme.toggle()"
            [attr.aria-label]="theme.isDark() ? 'Włącz jasny motyw' : 'Włącz ciemny motyw'"
            [title]="theme.isDark() ? 'Jasny motyw' : 'Ciemny motyw'">
      {{ theme.isDark() ? '☀️' : '🌙' }}
    </button>
    <a routerLink="/zlecenia" routerLinkActive="active" ariaCurrentWhenActive="page">
      Zlecenia
    </a>

    @if (auth.isLoggedIn()) {
      <a routerLink="/moje-zlecenia" routerLinkActive="active" ariaCurrentWhenActive="page">
        Moje zlecenia
      </a>
      <a routerLink="/dodaj-zlecenie" routerLinkActive="active" ariaCurrentWhenActive="page" class="btn-primary">
        + Dodaj zlecenie
      </a>
      <a routerLink="/profil" routerLinkActive="active" ariaCurrentWhenActive="page" class="user-chip" [title]="auth.currentUser()?.email ?? ''">
        <span class="user-avatar" aria-hidden="true">👤</span>
        {{ auth.currentUser()?.email | slice:0:16 }}
      </a>
      <button class="btn-logout" (click)="auth.logout()" aria-label="Wyloguj się">
        Wyloguj
      </button>
    } @else {
      <a routerLink="/logowanie" routerLinkActive="active" ariaCurrentWhenActive="page" class="btn-primary">
        Zaloguj się
      </a>
    }
  </nav>
</header>

<main class="main-content">
  <router-outlet />
</main>
