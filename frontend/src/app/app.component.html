<header class="navbar">
  <a routerLink="/" class="navbar__brand" aria-label="Strona główna" (click)="closeMenu()">
    <span class="navbar__icon" aria-hidden="true">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M7 1L13 4.5V9.5L7 13L1 9.5V4.5L7 1Z" fill="currentColor" opacity="0.9"/>
        <path d="M7 1L13 4.5L7 8L1 4.5L7 1Z" fill="white" opacity="0.22"/>
        <path d="M7 8V13L1 9.5V4.5L7 8Z" fill="white" opacity="0.1"/>
      </svg>
    </span>
    <span class="navbar__title">Druk3D</span>
  </a>

  <nav class="navbar__links" [class.navbar__links--open]="menuOpen()" id="main-nav" aria-label="Nawigacja główna">
    <a routerLink="/zlecenia" routerLinkActive="active" ariaCurrentWhenActive="page" (click)="closeMenu()">
      Zlecenia
    </a>

    @if (auth.isLoggedIn()) {
      <a routerLink="/moje-zlecenia" routerLinkActive="active" ariaCurrentWhenActive="page" (click)="closeMenu()">
        Moje zlecenia
      </a>
      <a routerLink="/wiadomosci" routerLinkActive="active" ariaCurrentWhenActive="page" class="nav-messages" (click)="closeMenu()">
        Wiadomości
        @if (unreadCount() > 0) {
          <span class="unread-badge">{{ unreadCount() }}</span>
        }
      </a>
      <a routerLink="/dodaj-zlecenie" routerLinkActive="active" ariaCurrentWhenActive="page" class="btn-primary" (click)="closeMenu()">
        Dodaj zlecenie
      </a>
      <a routerLink="/profil" routerLinkActive="active" ariaCurrentWhenActive="page" class="user-chip" [title]="auth.currentUser()?.email ?? ''" (click)="closeMenu()">
        <span class="user-avatar" aria-hidden="true">
          <svg width="11" height="11" viewBox="0 0 11 11" fill="none">
            <circle cx="5.5" cy="3.5" r="2" stroke="currentColor" stroke-width="1.25"/>
            <path d="M1 10c0-2.21 2.015-4 4.5-4S10 7.79 10 10" stroke="currentColor" stroke-width="1.25" stroke-linecap="round"/>
          </svg>
        </span>
        {{ auth.currentUser()?.email | slice:0:16 }}
      </a>
      <button class="btn-logout" (click)="auth.logout(); closeMenu()" aria-label="Wyloguj się">
        Wyloguj
      </button>
    } @else {
      <a routerLink="/logowanie" routerLinkActive="active" ariaCurrentWhenActive="page" class="btn-primary" (click)="closeMenu()">
        Zaloguj się
      </a>
    }
  </nav>

  <div class="navbar__end">
    <button class="btn-theme" (click)="theme.toggle()"
            [attr.aria-label]="theme.isDark() ? 'Włącz jasny motyw' : 'Włącz ciemny motyw'"
            [title]="theme.isDark() ? 'Jasny motyw' : 'Ciemny motyw'">
      @if (theme.isDark()) {
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none" aria-hidden="true">
          <circle cx="7.5" cy="7.5" r="2.5" stroke="currentColor" stroke-width="1.5"/>
          <line x1="7.5" y1="1" x2="7.5" y2="2.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="7.5" y1="12.5" x2="7.5" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="1" y1="7.5" x2="2.5" y2="7.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="12.5" y1="7.5" x2="14" y2="7.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="2.93" y1="2.93" x2="3.99" y2="4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="11" y1="11" x2="12.07" y2="12.07" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="11" y1="4" x2="12.07" y2="2.93" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="2.93" y1="12.07" x2="3.99" y2="11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      } @else {
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none" aria-hidden="true">
          <path d="M12.5 8.5A5 5 0 0 1 6 2a5 5 0 1 0 6.5 6.5Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      }
    </button>
    <button class="navbar__hamburger"
            [class.navbar__hamburger--open]="menuOpen()"
            (click)="toggleMenu()"
            [attr.aria-expanded]="menuOpen()"
            aria-controls="main-nav"
            aria-label="Menu nawigacji">
      <span class="navbar__hamburger-line" aria-hidden="true"></span>
      <span class="navbar__hamburger-line" aria-hidden="true"></span>
      <span class="navbar__hamburger-line" aria-hidden="true"></span>
    </button>
  </div>
</header>

@if (menuOpen()) {
  <div class="navbar__overlay" (click)="closeMenu()" aria-hidden="true"></div>
}

<main class="main-content">
  <router-outlet />
</main>
