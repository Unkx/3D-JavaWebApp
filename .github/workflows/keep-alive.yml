name: Keep Backend Warm

# Render's free tier spins the backend down after 15 minutes of inactivity;
# the next real request then eats a 30-60s cold-start and can 502 while the
# container boots (this broke login: POST /api/auth/google 502 mid-cold-start).
# Pinging a cheap endpoint often enough keeps it warm without paying for an
# always-on Render plan.
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping backend
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 https://druk3d-backend.onrender.com/api/listings)
          echo "Backend responded with HTTP $STATUS"
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 500 ]; then
            echo "::warning::Backend returned $STATUS"
          fi
