name: E2E Smoke Tests

on:
  push:
    branches: [master, main, test]
  pull_request:
    branches: [master, main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL || 'admin@druk3d.pl' }}
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD || 'admin123' }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD || 'testpassword' }}

    steps:
      - uses: actions/checkout@v4

      - name: Start Docker Compose stack (no wait)
        run: docker compose up -d
        timeout-minutes: 2

      - name: Wait and capture backend startup
        run: |
          sleep 15
          echo "=== docker ps ==="
          docker ps -a
          echo "=== backend logs ==="
          docker logs 3d-javawebapp-backend-1 2>&1
          echo "=== backend inspect (State) ==="
          docker inspect 3d-javawebapp-backend-1 --format '{{json .State}}' 2>&1

      - name: Wait for backend healthy
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/api/listings > /dev/null 2>&1; then
              echo "Backend healthy after ${i} attempts"
              exit 0
            fi
            echo "Attempt $i: backend not ready, waiting 10s..."
            sleep 10
          done
          echo "=== FINAL backend logs ==="
          docker logs 3d-javawebapp-backend-1 2>&1
          exit 1
        timeout-minutes: 6

      - name: Wait for frontend healthy
        run: |
          for i in $(seq 1 18); do
            if curl -sf http://localhost:4200 > /dev/null 2>&1; then
              echo "Frontend healthy after ${i} attempts"
              exit 0
            fi
            echo "Attempt $i: frontend not ready, waiting 10s..."
            sleep 10
          done
          echo "=== FINAL frontend logs ==="
          docker logs 3d-javawebapp-frontend-1 2>&1
          exit 1
        timeout-minutes: 4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: e2e/package-lock.json

      - name: Install e2e dependencies
        run: cd e2e && npm ci

      - name: Install Playwright browsers
        run: cd e2e && npx playwright install --with-deps chromium

      - name: Run Playwright smoke tests
        run: cd e2e && npx playwright test
        env:
          CI: true
          BASE_URL: http://localhost:4200
          BACKEND_URL: http://localhost:8080

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

      - name: Tear down Docker Compose stack
        if: always()
        run: docker compose down -v
