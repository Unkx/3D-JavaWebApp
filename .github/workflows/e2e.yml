name: E2E Smoke Tests

on:
  push:
    branches: [master, main, test]
  pull_request:
    branches: [master, main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      # Throwaway credentials for an ephemeral CI-only database/admin account —
      # fresh container every run, nothing persists, so no reason to source
      # these from repo secrets (a misconfigured secret here previously broke
      # Postgres auth: backend and db resolved the same secrets.POSTGRES_PASSWORD
      # expression yet still ended up out of sync).
      TEST_USER_EMAIL: admin@druk3d.pl
      TEST_USER_PASSWORD: admin123
      POSTGRES_PASSWORD: testpassword

    steps:
      - uses: actions/checkout@v4

      - name: Generate ephemeral JWT_SECRET for CI
        run: echo "JWT_SECRET=$(openssl rand -base64 48)" >> $GITHUB_ENV

      - name: Build and start Docker Compose stack
        run: |
          echo "🔨 Building containers..."
          docker compose build --build-arg CACHEBUST=$(date +%s)
          
          echo "🚀 Starting containers..."
          docker compose up -d
          
          echo "⏳ Waiting 30 seconds for services to initialize..."
          sleep 30
          
          echo "📋 Checking container status..."
          docker compose ps --all
        timeout-minutes: 10

      - name: 🔬 TEMP DEBUG — compare resolved DB credentials (throwaway creds, safe to print)
        if: always()
        run: |
          echo "--- backend container env ---"
          docker exec 3d-javawebapp-backend-1 sh -c 'echo "DB_USERNAME=[$DB_USERNAME] len=${#DB_USERNAME}"; echo "DB_PASSWORD=[$DB_PASSWORD] len=${#DB_PASSWORD}"' || echo "backend exec failed"
          echo "--- db container env ---"
          docker exec 3d-javawebapp-db-1 sh -c 'echo "POSTGRES_USER=[$POSTGRES_USER] len=${#POSTGRES_USER}"; echo "POSTGRES_PASSWORD=[$POSTGRES_PASSWORD] len=${#POSTGRES_PASSWORD}"' || echo "db exec failed"
          echo "--- resolved compose config ---"
          docker compose config || true

      - name: 📋 Dump ALL logs (always runs)
        if: always()
        run: |
          echo ""
          echo "═══════════════════════════════════════════════════════════════"
          echo "  DOCKER COMPOSE PS"
          echo "═══════════════════════════════════════════════════════════════"
          docker compose ps --all || true
          echo ""
          
          echo "═══════════════════════════════════════════════════════════════"
          echo "  BACKEND LOGS (full)"
          echo "═══════════════════════════════════════════════════════════════"
          docker compose logs --no-color --timestamps backend || echo "❌ No backend logs available"
          echo ""
          
          echo "═══════════════════════════════════════════════════════════════"
          echo "  FRONTEND LOGS (full)"
          echo "═══════════════════════════════════════════════════════════════"
          docker compose logs --no-color --timestamps frontend || echo "❌ No frontend logs available"
          echo ""
          
          echo "═══════════════════════════════════════════════════════════════"
          echo "  DATABASE LOGS"
          echo "═══════════════════════════════════════════════════════════════"
          docker compose logs --no-color --timestamps db || echo "❌ No db logs available"
          echo ""
          
          echo "═══════════════════════════════════════════════════════════════"
          echo "  CONTAINER STATUS (detailed)"
          echo "═══════════════════════════════════════════════════════════════"
          
          for container in 3d-javawebapp-backend-1 3d-javawebapp-frontend-1 3d-javawebapp-db-1; do
            echo "🔍 Container: $container"
            STATUS=$(docker inspect -f '{{.State.Status}}' "$container" 2>/dev/null || echo "NOT_FOUND")
            EXITCODE=$(docker inspect -f '{{.State.ExitCode}}' "$container" 2>/dev/null || echo "N/A")
            ERROR=$(docker inspect -f '{{.State.Error}}' "$container" 2>/dev/null || echo "N/A")
            echo "   Status:    $STATUS"
            echo "   Exit Code: $EXITCODE"
            echo "   Error:     $ERROR"
            echo ""
          done

      - name: ✅ Verify backend is running
        id: check-backend
        run: |
          echo "🔍 Checking if backend is running..."
          STATUS=$(docker inspect -f '{{.State.Status}}' 3d-javawebapp-backend-1 2>/dev/null || echo "not_found")
          
          if [ "$STATUS" = "running" ]; then
            echo "✅ Backend is running!"
            exit 0
          else
            echo "❌ Backend is NOT running (status: $STATUS)"
            echo ""
            echo "📋 Full backend logs:"
            docker compose logs --no-color --timestamps backend || true
            exit 1
          fi

      - name: ✅ Verify frontend is running
        id: check-frontend
        run: |
          echo "🔍 Checking if frontend is running..."
          STATUS=$(docker inspect -f '{{.State.Status}}' 3d-javawebapp-frontend-1 2>/dev/null || echo "not_found")
          
          if [ "$STATUS" = "running" ]; then
            echo "✅ Frontend is running!"
            exit 0
          else
            echo "❌ Frontend is NOT running (status: $STATUS)"
            echo ""
            echo "📋 Full frontend logs:"
            docker compose logs --no-color --timestamps frontend || true
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: e2e/package-lock.json

      - name: Install e2e dependencies
        run: cd e2e && npm ci

      - name: Install Playwright browsers
        run: cd e2e && npx playwright install --with-deps chromium

      - name: Run Playwright smoke tests
        run: cd e2e && npx playwright test
        env:
          CI: true
          BASE_URL: http://localhost:4200
          BACKEND_URL: http://localhost:8080

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

      - name: Tear down Docker Compose stack
        if: always()
        run: docker compose down -v