name: E2E Smoke Tests

on:
  push:
    branches: [master, main, test]
  pull_request:
    branches: [master, main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL || 'admin@druk3d.pl' }}
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD || 'admin123' }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD || 'testpassword' }}

    steps:
      - uses: actions/checkout@v4

      - name: Start Docker Compose stack
        run: |
          docker compose build --build-arg CACHEBUST=$(date +%s) backend
          docker compose up -d || true
          sleep 20
          docker compose ps --all
        timeout-minutes: 10

      - name: Dump backend logs (always)
        if: always()
        run: |
          echo "==== docker compose ps ===="
          docker compose ps --all || true
          echo ""
          echo "==== backend logs ===="
          docker compose logs --no-color --timestamps --tail 300 backend 2>&1 || echo "(no logs)"
          echo ""
          echo "==== backend container inspect ===="
          docker inspect 3d-javawebapp-backend-1 2>/dev/null | python3 -c "import sys,json; s=json.load(sys.stdin)[0]['State']; print(s)" || echo "(no container)"

      - name: Wait for backend container
        run: |
          echo "Waiting for backend container to start..."
          for i in $(seq 1 20); do
            STATUS=$(docker inspect -f '{{.State.Status}}' 3d-javawebapp-backend-1 2>/dev/null || echo "not_found")
            echo "Attempt $i: backend status = $STATUS"
            
            if [ "$STATUS" = "running" ]; then
              echo "✅ Backend is running!"
              docker compose logs --tail 20 backend || true
              exit 0
            elif [ "$STATUS" = "exited" ]; then
              echo "❌ Backend exited. Showing logs:"
              docker compose logs --tail 100 backend || true
              exit 1
            fi
            sleep 5
          done
          echo "❌ Timeout waiting for backend"
          docker compose logs --tail 100 backend || true
          exit 1
        timeout-minutes: 5

      - name: Wait for frontend healthy
        run: |
          for i in $(seq 1 18); do
            if curl -sf http://localhost:4200 > /dev/null 2>&1; then
              echo "Frontend healthy after ${i} attempts"
              exit 0
            fi
            echo "Attempt $i: frontend not ready, waiting 10s..."
            sleep 10
          done
          echo "=== Timeout: final frontend logs ==="
          docker compose logs --no-color --timestamps frontend || true
          exit 1
        timeout-minutes: 4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: e2e/package-lock.json

      - name: Install e2e dependencies
        run: cd e2e && npm ci

      - name: Install Playwright browsers
        run: cd e2e && npx playwright install --with-deps chromium

      - name: Run Playwright smoke tests
        run: cd e2e && npx playwright test
        env:
          CI: true
          BASE_URL: http://localhost:4200
          BACKEND_URL: http://localhost:8080

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

      - name: Tear down Docker Compose stack
        if: always()
        run: docker compose down -v