name: E2E Smoke Tests

on:
  push:
    branches: [master, main, test]
  pull_request:
    branches: [master, main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL || 'admin@druk3d.pl' }}
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD || 'admin123' }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD || 'testpassword' }}

    steps:
      - uses: actions/checkout@v4

      - name: Start Docker Compose stack
        run: docker compose up -d --wait
        timeout-minutes: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: e2e/package-lock.json

      - name: Install e2e dependencies
        run: cd e2e && npm ci

      - name: Install Playwright browsers
        run: cd e2e && npx playwright install --with-deps chromium

      - name: Run Playwright smoke tests
        run: cd e2e && npx playwright test
        env:
          CI: true
          BASE_URL: http://localhost:4200
          BACKEND_URL: http://localhost:8080

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

      - name: Tear down Docker Compose stack
        if: always()
        run: docker compose down -v
