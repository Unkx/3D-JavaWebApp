services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: 3D-JavaApp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-testpassword}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d 3D-JavaApp"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://db:5432/3D-JavaApp
      DB_USERNAME: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-testpassword}
      ADMIN_EMAIL: ${TEST_USER_EMAIL:-admin@druk3d.pl}
      ADMIN_PASSWORD: ${TEST_USER_PASSWORD:-admin123}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/listings > /dev/null"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    ports:
      - "4200:4200"
    environment:
      API_URL: http://backend:8080
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:4200 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 60s
