services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: 3D-JavaApp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-testpassword}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d 3D-JavaApp"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://db:5432/3D-JavaApp
      DB_USERNAME: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-testpassword}
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET must be set — run: export JWT_SECRET=$(openssl rand -base64 48)}"
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:4200}
      ADMIN_EMAIL: ${TEST_USER_EMAIL:-admin@druk3d.pl}
      # Not "admin123" — DataInitializer refuses to seed the admin account with
      # that committed default password (see DataInitializer.java) unless the
      # insecure-secret bypass is set, which we deliberately avoid here.
      ADMIN_PASSWORD: ${TEST_USER_PASSWORD:-e2eAdminPass456}
      # Local/CI compose stack has no real mail server — accounts registered here
      # would otherwise be stuck unverified forever. Never set this for a real deployment.
      AUTO_VERIFY_EMAIL: ${AUTO_VERIFY_EMAIL:-true}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    ports:
      - "4200:4200"
    environment:
      API_URL: http://backend:8080
    depends_on:
      - backend